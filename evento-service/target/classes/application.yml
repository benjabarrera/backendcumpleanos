server:
  port: 8082

spring:
  application:
    name: evento-service
  datasource:
    url: jdbc:mysql://localhost:3306/eventos_infantiles?useSSL=false&serverTimezone=UTC
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
